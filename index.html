<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat Karo — Random Chat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0d0d0d;
      color: #e0e0e0;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* ── Header ── */
    header {
      width: 100%;
      max-width: 640px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: #1a1a2e;
      border-bottom: 1px solid #2a2a4a;
    }
    header h1 { font-size: 1.2rem; color: #7b8cde; }
    header .subtitle { font-size: 0.65rem; color: #5b9cff; font-weight: 400; letter-spacing: 0.5px; }
    #onlineCount { font-size: 0.8rem; color: #6bcb77; }

    /* ── Screens ── */
    .screen { display: none; width: 100%; max-width: 640px; flex: 1; flex-direction: column; }
    .screen.active { display: flex; }

    /* ── Landing ── */
    #landing {
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 32px 24px;
    }
    #landing h2 { font-size: 1.6rem; color: #fff; text-align: center; }
    #landing p  { color: #aaa; text-align: center; font-size: 0.9rem; }

    .form-group { display: flex; flex-direction: column; gap: 8px; width: 100%; max-width: 320px; }
    .form-group label { font-size: 0.85rem; color: #aaa; }
    .form-group input, .form-group select {
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid #333;
      background: #1e1e1e;
      color: #e0e0e0;
      font-size: 1rem;
      outline: none;
    }
    .form-group input:focus, .form-group select:focus { border-color: #7b8cde; }

    .age-check { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; color: #aaa; }
    .age-check input { width: 16px; height: 16px; cursor: pointer; }

    .btn {
      padding: 12px 28px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: #7b8cde; color: #fff; }
    .btn-danger  { background: #e05c5c; color: #fff; }
    .btn-success { background: #6bcb77; color: #111; }
    .btn-sm { padding: 7px 16px; font-size: 0.85rem; }

    /* ── Searching ── */
    #searching {
      align-items: center;
      justify-content: center;
      gap: 16px;
    }
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid #333;
      border-top-color: #7b8cde;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Chat ── */
    #chat { padding: 0; }
    #chatHeader {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      background: #1a1a2e;
      border-bottom: 1px solid #2a2a4a;
      gap: 8px;
      flex-wrap: wrap;
    }
    #partnerInfo { font-size: 0.95rem; color: #ccc; }
    #partnerInfo span { color: #7b8cde; font-weight: 600; }
    .chat-actions { display: flex; gap: 8px; }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .msg {
      max-width: 75%;
      padding: 9px 13px;
      border-radius: 12px;
      font-size: 0.92rem;
      line-height: 1.4;
      word-break: break-word;
    }
    .msg.mine    { align-self: flex-end; background: #7b8cde; color: #fff; border-bottom-right-radius: 3px; }
    .msg.theirs  { align-self: flex-start; background: #2a2a3e; color: #e0e0e0; border-bottom-left-radius: 3px; }
    .msg.system  { align-self: center; background: transparent; color: #888; font-size: 0.8rem; font-style: italic; }
    .msg .sender { font-size: 0.75rem; opacity: 0.7; margin-bottom: 3px; }
    
    /* Photo message styling */
    .msg.photo-mine { max-width: auto; padding: 0; background: transparent; }
    .msg.photo-theirs { max-width: auto; padding: 0; background: transparent; }
    .photo-content {
      max-width: 200px;
      border-radius: 12px;
      overflow: hidden;
    }
    .photo-content img {
      width: 100%;
      height: auto;
      display: block;
    }

    #typingIndicator { padding: 4px 16px; font-size: 0.8rem; color: #888; min-height: 22px; }

    #inputArea {
      display: flex;
      gap: 8px;
      padding: 10px 14px;
      background: #1a1a2e;
      border-top: 1px solid #2a2a4a;
    }
    #msgInput {
      flex: 1;
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid #333;
      background: #1e1e1e;
      color: #e0e0e0;
      font-size: 0.95rem;
      outline: none;
      resize: none;
    }
    #msgInput:focus { border-color: #7b8cde; }
    
    #fileInput { display: none; }

    /* ── Report modal ── */
    #reportModal {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    #reportModal.open { display: flex; }
    .modal-box {
      background: #1e1e2e;
      border-radius: 12px;
      padding: 24px;
      width: 90%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .modal-box h3 { color: #e05c5c; }
    .modal-box select {
      padding: 9px 12px;
      border-radius: 8px;
      border: 1px solid #333;
      background: #111;
      color: #e0e0e0;
      font-size: 0.95rem;
    }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }

    @media (max-width: 480px) {
      header h1 { font-size: 1rem; }
      .msg { max-width: 88%; }
      .photo-content { max-width: 150px; }
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>🔵 Chat Karo</h1>
    <span class="subtitle">made by vishal</span>
  </div>
  <span id="onlineCount">● 0 online</span>
</header>

<!-- ── Landing Screen ── -->
<div id="landing" class="screen active">
  <h2>Meet Strangers, Chat Freely</h2>
  <p>Connect with random people instantly. No sign-up needed.</p>

  <div class="form-group">
    <label for="nameInput">Your Name</label>
    <input id="nameInput" type="text" placeholder="Enter your name" maxlength="30" />
  </div>

  <div class="form-group">
    <label for="genderSelect">Your Gender</label>
    <select id="genderSelect">
      <option value="male">Male</option>
      <option value="female">Female</option>
      <option value="other">Other</option>
    </select>
  </div>

  <label class="age-check">
    <input type="checkbox" id="ageCheck" />
    I confirm I am 18 years or older
  </label>

  <button class="btn btn-primary" onclick="startSearch()">Start Chatting →</button>
</div>

<!-- ── Searching Screen ── -->
<div id="searching" class="screen">
  <div class="spinner"></div>
  <p>Looking for someone to chat with…</p>
  <button class="btn btn-danger btn-sm" onclick="cancelSearch()">Cancel</button>
</div>

<!-- ── Chat Screen ── -->
<div id="chat" class="screen">
  <div id="chatHeader">
    <div id="partnerInfo">Chatting with <span id="partnerName">—</span></div>
    <div class="chat-actions">
      <button class="btn btn-sm" style="background:#2a2a4a;color:#ccc" onclick="triggerPhotoUpload()">📷 Photo</button>
      <button class="btn btn-danger btn-sm" onclick="openReport()">🚩 Report</button>
      <button class="btn btn-success btn-sm" onclick="newChat()">Next →</button>
    </div>
  </div>

  <div id="messages"></div>
  <div id="typingIndicator"></div>

  <div id="inputArea">
    <textarea id="msgInput" rows="1" placeholder="Type a message…" maxlength="500"></textarea>
    <button class="btn btn-primary" onclick="sendMessage()">Send</button>
    <input type="file" id="fileInput" accept="image/*" capture="environment" />
  </div>
</div>

<!-- ── Report Modal ── -->
<div id="reportModal">
  <div class="modal-box">
    <h3>🚩 Report User</h3>
    <select id="reportReason">
      <option value="spam">Spam</option>
      <option value="harassment">Harassment</option>
      <option value="inappropriate">Inappropriate content</option>
      <option value="underage">Suspected underage</option>
      <option value="other">Other</option>
    </select>
    <div class="modal-actions">
      <button class="btn btn-sm" style="background:#333;color:#ccc" onclick="closeReport()">Cancel</button>
      <button class="btn btn-danger btn-sm" onclick="submitReport()">Submit Report</button>
    </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();

  // ── UI helpers ──────────────────────────────────────────────
  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function addMessage(text, type = 'system', sender = '', isPhoto = false) {
    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    
    if (isPhoto) {
      div.className = `msg photo-${type}`;
      const photoDiv = document.createElement('div');
      photoDiv.className = 'photo-content';
      const img = document.createElement('img');
      img.src = text; // text contains the data URL
      photoDiv.appendChild(img);
      div.appendChild(photoDiv);
    } else {
      div.className = `msg ${type}`;
      if (sender) {
        const s = document.createElement('div');
        s.className = 'sender';
        s.textContent = sender;
        div.appendChild(s);
      }
      div.appendChild(document.createTextNode(text));
    }
    
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function clearMessages() {
    document.getElementById('messages').innerHTML = '';
    document.getElementById('typingIndicator').textContent = '';
  }

  // ── Actions ─────────────────────────────────────────────────
  function startSearch() {
    const name = document.getElementById('nameInput').value.trim();
    const gender = document.getElementById('genderSelect').value;
    const ageOk = document.getElementById('ageCheck').checked;

    if (!name) { alert('Please enter your name.'); return; }
    if (!ageOk) { alert('You must confirm you are 18+ to continue.'); return; }

    showScreen('searching');
    socket.emit('startSearch', { name, gender });
  }

  function cancelSearch() {
    socket.emit('newChat'); // clears queue server-side
    showScreen('landing');
  }

  function sendMessage() {
    const input = document.getElementById('msgInput');
    const msg = input.value.trim();
    if (!msg) return;
    socket.emit('sendMessage', msg);
    addMessage(msg, 'mine');
    input.value = '';
    socket.emit('stopTyping');
  }

  function newChat() {
    clearMessages();
    socket.emit('newChat');
    showScreen('searching');
  }

  function triggerPhotoUpload() {
    document.getElementById('fileInput').click();
  }

  function openReport()  { document.getElementById('reportModal').classList.add('open'); }
  function closeReport() { document.getElementById('reportModal').classList.remove('open'); }

  function submitReport() {
    const reason = document.getElementById('reportReason').value;
    socket.emit('report', { reason });
    closeReport();
    clearMessages();
    addMessage('User reported. Finding a new match…', 'system');
    showScreen('searching');
  }

  // ── Photo Upload ─────────────────────────────────────────────
  document.getElementById('fileInput').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;

    // Validate file size (5MB max)
    if (file.size > 5 * 1024 * 1024) {
      alert('Photo is too large (max 5MB)');
      return;
    }

    const reader = new FileReader();
    reader.onload = (event) => {
      const base64 = event.target.result;
      socket.emit('sendPhoto', base64);
      addMessage(base64, 'mine', '', true);
    };
    reader.readAsDataURL(file);

    // Reset input for re-upload
    e.target.value = '';
  });

  // ── Typing ──────────────────────────────────────────────────
  let typingTimer;
  document.getElementById('msgInput').addEventListener('input', () => {
    socket.emit('typing');
    clearTimeout(typingTimer);
    typingTimer = setTimeout(() => socket.emit('stopTyping'), 1500);
  });

  document.getElementById('msgInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  // ── Socket events ────────────────────────────────────────────
  socket.on('onlineCount', (count) => {
    document.getElementById('onlineCount').textContent = `● ${count} online`;
  });

  socket.on('searching', () => {
    showScreen('searching');
  });

  socket.on('chatConnected', ({ partnerName, partnerGender }) => {
    clearMessages();
    document.getElementById('partnerName').textContent = partnerName;
    showScreen('chat');
    addMessage(`Connected with ${partnerName}. Say hi! 👋`, 'system');
  });

  socket.on('receiveMessage', ({ name, message }) => {
    addMessage(message, 'theirs', name);
  });

  socket.on('partnerTyping', (name) => {
    document.getElementById('typingIndicator').textContent = `${name} is typing…`;
  });

  socket.on('partnerStopTyping', () => {
    document.getElementById('typingIndicator').textContent = '';
  });

  // When someone requests a photo, show a system message with a Choose file button
  socket.on('photoRequested', (name) => {
    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'msg system';

    const txt = document.createElement('div');
    txt.textContent = `${name} requested a photo.`;
    div.appendChild(txt);

    const btn = document.createElement('button');
    btn.className = 'btn btn-sm';
    btn.textContent = 'Choose file';
    btn.style.marginTop = '8px';
    btn.onclick = () => {
      const fileInput = document.getElementById('fileInput');
      if (fileInput) fileInput.click();
    };
    div.appendChild(btn);

    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
  });

  socket.on('receivePhoto', ({ name, photo }) => {
    addMessage(photo, 'theirs', `${name} sent a photo`, true);
  });

  socket.on('partnerDisconnected', () => {
    addMessage('Partner disconnected. Click "Next →" to find someone new.', 'system');
    document.getElementById('typingIndicator').textContent = '';
  });
</script>
</body>
</html>
